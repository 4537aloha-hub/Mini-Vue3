<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="demo">
        <ul>
        <li v-for="(item, index) in items" :key="item.name" >
            {{index}}:{{item.name}}
        </li>
      </ul>
    </div>


   <script type="module">
    import MiniVue from '../index.js';
    const { createApp, ref, reactive } = MiniVue;
    createApp({
        setup() {
        const items = reactive([{
        name: 'foo',
        },
        {
          name: 'bar',
        },
    ])
        return {
            items,
        }
    }
}).mount('#demo');

   </script> 
</body>
</html>
