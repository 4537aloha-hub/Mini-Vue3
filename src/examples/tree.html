<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MiniVue Tree</title>
</head>
<body>


<p>(You can double click on an item to turn it into a folder.)</p>

<!-- the app root element -->
<ul id="demo">
  <tree-item class="item" :model="treeData"></tree-item>
</ul>


<!-- item template -->
<script type="text/x-template" id="item-template">
  <li>
    <div
      :class="isFolder.value ? 'bold' : ''"
      @click="toggle"
      @dblclick="changeType">
      {{model.name}}
      <span v-if="isFolder.value">[{{open.value ? '-' : '+'}}]</span>
    </div>
    <ul v-if="isFolder.value" :style="{display: open.value ? 'block' : 'none'}">
      <tree-item
        class="item"
        v-for="child in model.children"
        :key="child.name"
        :model="child">
      </tree-item>
      <li class="add" @click="addChild">+</li>
    </ul>
  </li>
</script>

<!-- 把两个 module 合并成一个，解决作用域隔离问题！！ -->
<script type="module">
  import MiniVue from "../index.js";
  const { reactive, computed, ref } = MiniVue;

  // 树形组件定义
  const TreeItem = {
    template: '#item-template',
    props: ['model'],
    setup(props) {
      const open = ref(false);
      const isFolder = computed(() => {
        return props.model.children && props.model.children.length;
      });

      function toggle() {
        open.value = !open.value;
      }

      function changeType() {
        if (!isFolder.value) {
          props.model.children = [];
          addChild();
          open.value = true;
        }
      }

      function addChild() {
        props.model.children.push({
          name: 'new stuff',
        });
      }

      return {
        open,
        isFolder,
        toggle,
        changeType,
        addChild,
      };
    },
  };

  // 根数据
  const treeData = {
    name: 'My Tree',
    children: [
      { name: 'hello' },
      { name: 'wat' },
      {
        name: 'child folder',
        children: [
          {
            name: 'child folder',
            children: [
              { name: 'hello' },
              { name: 'wat' }
            ]
          },
          { name: 'hello' },
          { name: 'wat' },
          {
            name: 'child folder',
            children: [
              { name: 'hello' },
              { name: 'wat' }
            ]
          }
        ]
      }
    ]
  };

  // 挂载应用
  MiniVue.createApp({
    components: {
      TreeItem,
    },
    setup() {
      return {
        treeData,
      };
    },
  }).mount('#demo');
</script>


<style>
  body {
    font-family: Menlo, Consolas, monospace;
    color: #444;
  }
  .item {
    cursor: pointer;
  }
  .bold {
    font-weight: bold;
  }
  ul {
    padding-left: 1em;
    line-height: 1.5em;
    list-style-type: dot;
  }
</style>
</body>
</html>
