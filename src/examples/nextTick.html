<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nextTick</title>
</head>
<body>
    

    <script type="module">
    import MiniVue from '../index.js'
    const { createApp, ref, h, nextTick } = MiniVue;

    createApp({
        setup() {
            const count = ref(0);
            const add = () => {
                count.value++;
                count.value++;
                count.value++;
            };
            return {
                count,
                add,
            };
        },

    render(ctx) {
        console.log('render执行了一次');
        
        return [
            h('div', {id: 'div'}, ctx.count.value),
            h('button', { id: 'btn', onClick: ctx.add }, 'add'),
        ];
    },
}).mount(document.body);   

const div = document.getElementById('div');
const btn = document.getElementById('btn');
console.log(div.innerHTML);

btn.click();
console.log(div.innerHTML);

nextTick(() => {
    console.log(div.innerHTML);
});
    </script>
</body>
</html>
