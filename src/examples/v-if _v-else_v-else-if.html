<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
    Counter
    <div>{{ counter.value }}</div>
    <button @click="add">click</button>

    <br />

    <h1 v-if="ok.value">I'm here</h1>
    <h2 v-else>I'm not here 2</h2>
    <h3 v-else-if="ok2.value">I'm not here 3</h3>

    <br />

    <button @click="toggle">toggle</button>
    
    <br />

    <divf />

    </div>

<script type="module">

  import MiniVue from '../index.js';

  const { createApp, ref, reactive, resolveComponent } = MiniVue;

  createApp({
    setup() {

      const counter = ref(0);
      const add = () => {
        counter.value++;
        console.log(counter.value);
      };
      const ok = ref(true);
      const ok2 = ref(true);
      const toggle = () => {
        ok.value = !ok.value;
      }
      
      return {
        counter,
        add,
        ok,
        ok2,
        toggle,
      }
    }
  }).mount('#app');
</script>
</body>
</html>
