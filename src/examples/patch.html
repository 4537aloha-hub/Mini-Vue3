<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script type="module">
        import MiniVue from '../index.js'
        const { createApp, ref, h, render,Fragment } = MiniVue;

        render(
            h('ul', null, [
                h('li', null, 'first'),
                h(Fragment, null, []),
                h('li', null, 'last'),
            ]),
            document.body
        )

        // 2秒后，添加中间的li
        setTimeout(() => {
            render(
                h('ul', null, [
                    h('li', null, 'first'),
                    h(Fragment, null, [
                        h('li', null, 'middle'),
                    ]),
                    h('li', null, 'last'),
                ]),
                document.body
            )
        }, 2000);
    </script>
</body>
</html>
